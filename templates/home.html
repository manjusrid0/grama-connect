{% extends "base.html" %}

{% block content %}

<!-- 🔒 Hidden image slides for background animation -->
<div class="hidden-slides">
  <img class="slide" src="{{ url_for('static', filename='uploads/bb.jpg') }}">
  <img class="slide" src="{{ url_for('static', filename='uploads/a2.jpg') }}">
  <img class="slide" src="{{ url_for('static', filename='uploads/a3.jpg') }}">
  <img class="slide" src="{{ url_for('static', filename='uploads/a4.jpg') }}">
  <img class="slide" src="{{ url_for('static', filename='uploads/a5.jpg') }}">
  <img class="slide" src="{{ url_for('static', filename='uploads/a6.jpg') }}">
  <img class="slide" src="{{ url_for('static', filename='uploads/a12.jpg') }}">
  <img class="slide" src="{{ url_for('static', filename='uploads/a8.jpg') }}">
  <img class="slide" src="{{ url_for('static', filename='uploads/a9.jpg') }}">
  <img class="slide" src="{{ url_for('static', filename='uploads/weaving.jpg') }}">
  <img class="slide" src="{{ url_for('static', filename='uploads/a13.jpg') }}">
</div>

<!-- 🌄 Dynamic background container -->
<div id="moving-background"></div>

<!-- 🌿 Centered upward marquee welcome message -->
<div id="welcome-container">
  <marquee id="welcome-text" behavior="scroll" direction="left" scrollamount="3">
    <h1>{{ _("Welcome to Grama Connect") }} </h1>
  </marquee>
</div>

<!-- 🧠 Scripts for slideshow and speech -->
<script>
// ===== Background Slideshow =====
const slides = document.querySelectorAll('.slide');
const bgDiv = document.getElementById('moving-background');
let index = 0;

function showSlide() {
  if (slides[index]) {
    const imgSrc = slides[index].src;
    bgDiv.style.backgroundImage = `url(${imgSrc})`;
    bgDiv.style.opacity = 0;
    setTimeout(() => {
      bgDiv.style.opacity = 1;
    }, 50);
  }
  index = (index + 1) % slides.length;
}

// Initialize first slide
showSlide();
setInterval(showSlide, 4000);

// ===== Voice Feature =====
function speakText(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "ta-IN"; // Tamil voice (change to "en-IN" for English)
  speech.rate = 1.0;
  speech.pitch = 1;
  window.speechSynthesis.speak(speech);
}

// Speak marquee text when page loads
window.addEventListener("load", () => {
  const marqueeText = document.getElementById("welcome-text").innerText;
  speakText(marqueeText);
});

// Speak each navbar item when hovered
document.addEventListener("DOMContentLoaded", () => {
  const navItems = document.querySelectorAll("nav a, .navbar a, .nav-link");
  navItems.forEach(item => {
    item.addEventListener("mouseenter", () => {
      speakText(item.innerText);
    });
  });
});
</script>

<!-- 🌸 Styling -->
<style>
/* ===== Moving Background ===== */
#moving-background {
  position: fixed;
  top: 10;
  left: 0;
  width: 100%;
  height: 100%;
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  transition: opacity 1.5s ease, transform 8s ease-in-out;
  z-index: -1;
  opacity: 1;
  animation: zoomEffect 8s infinite alternate;
}

@keyframes zoomEffect {
  0% { transform: scale(1); }
  100% { transform: scale(1.05); }
}

/* ===== Scrollbar ===== */
body {
  overflow-y: scroll;
  min-height: 100vh;
}

body::-webkit-scrollbar {
  width: 10px;
}

body::-webkit-scrollbar-thumb {
  background-color: #888;
  border-radius: 6px;
}

body::-webkit-scrollbar-thumb:hover {
  background-color: #555;
}

/* Hide the hidden slides */
.hidden-slides {
  display: none;
}

/* ===== Centered Marquee Styling ===== */
#welcome-container {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 350px;
  height: 180px;
  text-align: center;
  overflow: hidden;
  z-index: 2;
}

#welcome-text h1 {
  color: #fff;
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 1.8rem;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #f9f871, 0 0 20px #f7e600; }
  to { text-shadow: 0 0 25px #fff76a, 0 0 40px #ffe347; }
}
</style>

{% endblock %}
