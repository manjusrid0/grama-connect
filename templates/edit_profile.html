{% extends "base.html" %}
{% block content %}
<style>
    body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #eef0eb, #9ddcf0, #11dddd);
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow-y: auto;
    }

    .profile-container {
        max-width: 650px;
        margin: 50px auto;
        background: #fff;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        text-align: center;
    }

    .profile-header h2 {
        font-size: 28px;
        font-weight: bold;
        color: #510d70;
        margin-bottom: 15px;
    }

    .profile-pic {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #790e94;
        margin-bottom: 15px;
        background: #fff;
    }

    form {
        text-align: left;
        margin-top: 20px;
    }

    label {
        font-weight: bold;
        color: #2e7d32;
        display: block;
        margin-top: 15px;
    }

    input, textarea, select {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border: 1px solid #ccc;
        border-radius: 10px;
        font-size: 16px;
        background: #f1f8e9;
        transition: 0.2s;
    }

    input:focus, textarea:focus, select:focus {
        border-color: #11dddd;
        box-shadow: 0 0 5px #11dddd;
        outline: none;
    }

    .save-btn {
        display: inline-block;
        background: #388e3c;
        color: #fff;
        padding: 12px 25px;
        border-radius: 30px;
        text-decoration: none;
        font-size: 16px;
        margin-top: 25px;
        transition: 0.3s;
        border: none;
        cursor: pointer;
    }

    .save-btn:hover {
        background: #2e7d32;
        transform: scale(1.05);
    }

    .back-link {
        display: inline-block;
        margin-top: 20px;
        text-decoration: none;
        color: #045891;
        font-weight: 500;
    }

    .back-link:hover {
        text-decoration: underline;
    }

</style>

<div class="profile-container">
    <div class="profile-header">
        <img src="{{ url_for('static', filename=user.profile_pic or 'uploads/default.png') }}" class="profile-pic" alt="Profile Picture">
        <h2>Edit Profile</h2>
    </div>

    <form method="POST" action="{{ url_for('edit_profile') }}" enctype="multipart/form-data">
        <label for="profile_pic">Change Profile Picture:</label>
        <input type="file" id="profile_pic" name="profile_pic" accept="uploads/user.profile_pic or 'image/*'">

        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" value="{{ user.name }}" required>

        <label for="phone">Phone:</label>
        <input type="text" id="phone" name="phone" value="{{ user.phone or '' }}">

        <label for="location">Location:</label>
        <input type="text" id="location" name="location" value="{{ user.location or '' }}">

        <label for="profession">Profession:</label>
        <input type="text" id="profession" name="profession" value="{{ user.profession or '' }}" placeholder="e.g. Student, Farmer, Teacher">

        <label for="status">Status:</label>
        <input type="text" id="status" name="status" value="{{ user.status or '' }}" placeholder="e.g. Learning AI, Selling organic products">

        <label for="skills">Skills:</label>
        <textarea id="skills" name="skills" rows="3" placeholder="Add your skills (comma separated)">{{ user.skills or '' }}</textarea>

        <label for="courses">Courses/Certifications:</label>
        <textarea id="courses" name="courses" rows="3" placeholder="Add your completed or ongoing courses">{{ user.courses or '' }}</textarea>

        <button type="submit" class="save-btn">Save Changes</button>
    </form>

    <a href="{{ url_for('profile') }}" class="back-link">← Back to Profile</a>
</div>
{% endblock %}
